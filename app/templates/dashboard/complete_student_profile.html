{% extends "base.html" %}

{% block title %}Complete Student Profile - Exam Management System{% endblock %}

{% block content %}
<div class="py-4">
    <h1 class="mb-4">
        <i class="bi bi-mortarboard"></i> Complete Your Student Profile
    </h1>
    
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label" for="registration_number">Registration Number</label>
                            <input type="text" id="registration_number" name="registration_number" 
                                   class="form-control" required placeholder="e.g., MCA001">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label" for="department_id">Department</label>
                            <select id="department_id" name="department_id" class="form-select" required>
                                <option value="">-- Select Department --</option>
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}">{{ dept.name }} ({{ dept.code }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label" for="admission_year">Admission Year</label>
                            <input type="number" id="admission_year" name="admission_year" 
                                   class="form-control" required placeholder="e.g., 2023" min="2000">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle"></i> Complete Profile
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
