{% extends "base.html" %}

{% block title %}Reset Password - JIMS SEC-5 Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-premium border-0" style="border-radius: 20px;">
                <div class="card-header bg-white py-4 text-center">
                    <h4 class="fw-bold mb-0">Reset Password for {{ user.full_name }}</h4>
                </div>
                <div class="card-body p-5">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label">New Password</label>
                            <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary fw-bold">Update Password</button>
                            <a href="{{ url_for('dashboard.home') }}" class="btn btn-light">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
