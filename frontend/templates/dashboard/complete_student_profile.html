{% extends "base.html" %}

{% block title %}Onboarding - Set Up Your Profile{% endblock %}

{% block content %}
<div class="onboarding-page py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8 animate-up">
                <!-- Branding Header -->
                <div class="text-center mb-5">
                    <div class="onboarding-icon mb-3">
                        <i class="bi bi-mortarboard-fill"></i>
                    </div>
                    <h1 class="fw-800 text-slate-900 h2">Final Step, {{ current_user.full_name.split(' ')[0] }}!</h1>
                    <p class="text-slate-500">Just a few details to get your academic dashboard ready.</p>
                </div>

                <!-- Glass Card -->
                <div class="card onboarding-card border-0">
                    <div class="card-body p-5">
                        <form method="POST">
                            <div class="form-floating mb-4">
                                <input type="text" id="registration_number" name="registration_number" 
                                       class="form-control custom-input" required placeholder="Registration Number">
                                <label for="registration_number">Registration ID (e.g. MCA001)</label>
                            </div>
                            
                            <div class="form-floating mb-4">
                                <select id="department_id" name="department_id" class="form-select custom-input" required>
                                    <option value="" disabled selected>Select your domain</option>
                                    {% for dept in departments %}
                                        <option value="{{ dept.id }}">{{ dept.name }} ({{ dept.code }})</option>
                                    {% endfor %}
                                </select>
                                <label for="department_id">Academic Department</label>
                            </div>
                            
                            <div class="form-floating mb-5">
                                <input type="number" id="admission_year" name="admission_year" 
                                       class="form-control custom-input" required placeholder="Admission Year" min="2000" max="2030">
                                <label for="admission_year">Admission Year</label>
                            </div>
                            
                            <div class="d-grid shadow-premium-btn rounded-pill">
                                <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-800 py-3">
                                    Launch My Dashboard <i class="bi bi-arrow-right-short ms-2"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="{{ url_for('auth.logout') }}" class="text-slate-400 small text-decoration-none">
                        <i class="bi bi-box-arrow-left"></i> Logout and finish later
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.onboarding-page {
    background-color: #f8fafc;
    min-height: calc(100vh - 80px);
    display: flex;
    align-items: center;
}

.onboarding-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: white;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto;
    box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
}

.onboarding-card {
    background: #ffffff;
    border-radius: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
}

.form-floating > .custom-input {
    height: calc(3.5rem + 15px);
    line-height: 1.25;
    padding-top: 1.625rem;
    padding-bottom: 0.625rem;
    border: 2px solid #f1f5f9;
    border-radius: 16px;
    font-weight: 600;
    color: #1e293b;
}

.form-floating > select.custom-input {
    font-size: 0.95rem;
}

.custom-input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.05);
}

.form-floating > label {
    padding-left: 1.25rem;
    color: #64748b;
    font-weight: 500;
}

.form-floating > .custom-input:focus ~ label,
.form-floating > .custom-input:not(:placeholder-shown) ~ label {
    color: #4f46e5;
    transform: scale(.85) translateY(-.75rem) translateX(.15rem);
}

.shadow-premium-btn {
    box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
}

.animate-up {
    animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

.fw-800 { font-weight: 800; }
</style>
{% endblock %}
